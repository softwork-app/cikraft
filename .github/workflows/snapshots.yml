name: Upload Snapshots

on:
  push:
    branches: [ main ]

concurrency:
  group: snapshot
  cancel-in-progress: true

jobs:
  publishGitHubPackages:
    runs-on: ubuntu-26.04-arm

    permissions:
      contents: read
      packages: write

    environment:
      name: CD
      deployment: false

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: 'https://gradle.com/terms-of-service'
          build-scan-terms-of-use-agree: 'yes'
          cache-disabled: true

      - name: Release maven artifacts
        run: ./gradlew publishAllPublicationsToGitHubPackagesRepository -Pversion=0.0.0-SNAPSHOT
        env:
          ORG_GRADLE_PROJECT_GitHubPackagesUsername: ${{ github.actor }}
          ORG_GRADLE_PROJECT_GitHubPackagesPassword: ${{ github.token }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.SIGNING_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_KDGPUsername: ${{ github.actor }}
          ORG_GRADLE_PROJECT_KDGPPassword: ${{ github.token }}
